services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/rcm_demo.duckdb
    volumes:
      - ./backend/app:/app/app
      - backend_data:/data
    command: >
      sh -c "python scripts/seed_all.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_API_KEY=${DEMO_API_KEY:-demo-key-12345}
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  backend_data:
